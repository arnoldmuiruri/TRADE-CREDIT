# ── Engineered features ─────────────────────────────────────
features:
  point_in_time:
    - current_ratio               # CurrentAssets / CurrentLiabilities
    - debt_to_equity              # Liabilities / StockholdersEquity
    - interest_coverage           # OperatingIncomeLoss / InterestExpense
    - net_profit_margin           # NetIncomeLoss / Revenues
    - return_on_assets            # NetIncomeLoss / Assets
    - dso                         # (AccountsReceivable / Revenues) * 365
    - dpo                         # (AccountsPayable / COGS) * 365
    - cash_conversion_cycle       # DSO + DIO - DPO
    - altman_z_score              # weighted composite
 
  trend_features:                 # computed across years_of_history
    - current_ratio_trend
    - debt_to_equity_trend
    - interest_coverage_trend
    - dso_trend
    - dpo_trend
    - revenue_growth_3yr
 
  recovery_proxies:
    - tangible_asset_ratio        # PropertyPlantAndEquipmentNet / Liabilities
    - asset_intensity             # PropertyPlantAndEquipmentNet / Assets
 
# ── Altman Z-Score weights (manufacturing baseline) ─────────
# Z = 1.2*X1 + 1.4*X2 + 3.3*X3 + 0.6*X4 + 1.0*X5
altman_z_score:
  x1_weight: 1.2    # Working Capital / Total Assets
  x2_weight: 1.4    # Retained Earnings / Total Assets
  x3_weight: 3.3    # EBIT / Total Assets
  x4_weight: 0.6    # Market Value Equity / Total Liabilities
  x5_weight: 1.0    # Revenue / Total Assets
  thresholds:
    safe:       2.99
    grey_zone:  1.81
 
# ── Risk grading scale ───────────────────────────────────────
risk_grading:
  scale: 10
  tiers:
    low:
      grade_range: [1, 3]
      z_score_min: 2.99
      credit_limit_pct: 0.90      # 90% of requested exposure
      base_premium_rate: 0.0015   # 0.15% of insured turnover
    medium:
      grade_range: [4, 6]
      z_score_min: 1.81
      credit_limit_pct: 0.60
      base_premium_rate: 0.0035
    high:
      grade_range: [7, 8]
      z_score_min: 0.0
      credit_limit_pct: 0.25
      base_premium_rate: 0.0075
    decline:
      grade_range: [9, 10]
      z_score_min: null
      credit_limit_pct: 0.0
      base_premium_rate: null
 
# ── Premium calculation parameters ──────────────────────────
premium:
  insured_percentage: 0.85        # insurer covers 85% of loss (standard TC policy)
  recovery_discount_factor: 0.30  # reduces premium if high tangible asset ratio
  sector_multipliers:
    retail:         1.20
    construction:   1.40
    manufacturing:  1.00          # baseline
    energy:         1.30
 
# ── Portfolio concentration thresholds ──────────────────────
portfolio:
  max_single_sector_pct: 0.40     # flag if one sector > 40% of total exposure
  max_single_buyer_pct:  0.20     # flag if one buyer  > 20% of total exposure
  max_high_risk_pct:     0.30     # flag if high-risk buyers > 30% of total exposure
 
# ── Trend monitoring thresholds ─────────────────────────────
monitoring:
  grade_change_alert_threshold: 2   # alert if grade worsens by 2+ points YoY
  dpo_spike_threshold_days: 30      # alert if DPO increases by 30+ days YoY
  interest_coverage_floor: 1.5      # alert if coverage drops below 1.5x
  revenue_decline_threshold: -0.10  # alert if revenue falls more than 10% YoY